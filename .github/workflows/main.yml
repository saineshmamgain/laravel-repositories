name: Tests

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            laravel: '^11.0'
            testbench: '^9.0'
            stability: prefer-lowest
            experimental: false
          - php: '8.3'
            laravel: '^11.0'
            testbench: '^9.0'
            stability: prefer-stable
            experimental: false
          - php: '8.4'
            laravel: '^11.0'
            testbench: '^9.0'
            stability: prefer-stable
            experimental: false
          - php: '8.3'
            laravel: '^12.0'
            testbench: '^10.0'
            stability: prefer-lowest
            experimental: false
          - php: '8.3'
            laravel: '^12.0'
            testbench: '^10.0'
            stability: prefer-stable
            experimental: false
          - php: '8.4'
            laravel: '^12.0'
            testbench: '^10.0'
            stability: prefer-stable
            experimental: false
          - php: '8.3'
            laravel: '^13.0'
            testbench: '^11.0'
            stability: prefer-lowest
            experimental: false
          - php: '8.3'
            laravel: '^13.0'
            testbench: '^11.0'
            stability: prefer-stable
            experimental: false
          - php: '8.4'
            laravel: '^13.0'
            testbench: '^11.0'
            stability: prefer-stable
            experimental: false
          - php: '8.5'
            laravel: '^13.0'
            testbench: '^11.0'
            stability: prefer-stable
            experimental: true

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.stability }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo_sqlite, sqlite, fileinfo
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --dev --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Audit dependencies
        run: composer audit

      - name: Execute tests
        run: composer test
